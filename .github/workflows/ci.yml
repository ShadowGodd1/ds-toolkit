name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        os: [ubuntu-latest]
        include:
          # Also test on Windows and macOS with latest Python
          - python-version: "3.12"
            os: windows-latest
          - python-version: "3.12"
            os: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install core + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,boosting,fuzzy,explain,tune,track]"
      - name: Lint with ruff
        run: ruff check ds_toolkit/ds_toolkit/
      - name: Check formatting with black
        run: black --check ds_toolkit/ds_toolkit/
      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --tb=short \
            --cov=ds_toolkit/ds_toolkit \
            --cov-report=xml \
            --cov-report=term-missing \
            -q
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: ds-toolkit-coverage
        continue-on-error: true
  lint-types:
    name: mypy type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          pip install -e ".[dev,boosting,fuzzy,explain,tune,track]"
      - name: Type check
        run: mypy ds_toolkit/ds_toolkit/ --ignore-missing-imports
        continue-on-error: true   # non-blocking until full type coverage added

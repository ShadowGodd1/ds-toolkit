site_name: ds-toolkit
site_description: Post-collection data science lifecycle toolkit — from raw DataFrame to model card
site_author: Adnan Mohamud
site_url: https://ShadowGodd1.github.io/ds-toolkit

repo_name: ShadowGodd1/ds-toolkit
repo_url: https://github.com/ShadowGodd1/ds-toolkit
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            docstring_style: numpy
            members: ['ds_toolkit']
            docstring_section_style: "list"
            separate_signature: true
            signature_crossrefs: true
            show_signature_annotations: true
            show_module_summary: true
            show_category_heading: true
            show_if_no_docstring: false
            show_bases: true
            show_submodules: true
            show_root_full_path: false
            show_root_members_full_path: false
            show_object_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            group_by_category: true
            docstring_section_style: "list"
            inherited_members: true
            merge_init_into_class: true
            # custom_templates: "docs/templates"
            paths: ["ds_toolkit"]

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Design Principles: getting-started/design.md
  - User Guide:
    - Stage 1 — Understand: guide/stage1.md
    - Stage 2 — Clean: guide/stage2.md
    - Stage 3 — Features: guide/stage3.md
    - Stage 4 — Models: guide/stage4.md
    - Stage 5 — Evaluate: guide/stage5.md
    - Stage 6 — Infra: guide/stage6.md
    - Stage 7 — Report: guide/stage7.md
  - API Reference:
    - core: api/core.md
    - features: api/features.md
    - models: api/models.md
    - eval: api/eval.md
    - infra: api/infra.md
    - reporting: api/reporting.md
  - Contributing: contributing.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ShadowGodd1
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/adnan-mohamud-4567942b7
  analytics:
    provider: google
    property: G-XXXXXXXXXX  # add your GA4 property ID
